<script type="text/babel">

  const [chatHistory, setChatHistory] = useState([

        '\u5988\u7956\u6587\u5316\u5728\u95fd\u53f0\u4e24\u5730\u662f\u5982\u4f55\u4f20\u627f\u7684\uff1f'

  const categories = [
    { id: 1, title: '\u5730\u7406\u5377', sub: '\u798f\u5efa\u81ea\u7136\u5730\u7406\u3001\u53f0\u6e7e\u81ea\u7136\u5730\u7406...' },
    { id: 2, title: '\u5386\u53f2\u5377', sub: '\u53e4\u4ee3\u53f2\u3001\u8fd1\u73b0\u4ee3\u53f2\u3001\u91cd\u8981\u4e8b\u4ef6...' },
    { id: 3, title: '\u6c11\u65cf\u4e0e\u5b97\u65cf\u5377', sub: '\u59d3\u6c0f\u6e90\u6d41\u3001\u79fb\u6c11\u8fc1\u5c99\u3001\u65cf\u8c31...' },
    { id: 4, title: '\u6d77\u6d0b\u6587\u5316\u5377', sub: '\u6d77\u4e0a\u4e1d\u7ef8\u4e4b\u8def\u3001\u5988\u7956\u4fe1\u4ef0\u3001\u9020\u8239...' },

  const searchResults = [
    { id: 101, title: '\u798f\u5dde\u5e9c', chapter: '\u5730\u7406\u5377 \u00b7 \u798f\u5efa\u5386\u53f2\u5730\u7406', snippet: '\u798f\u5dde\u5e9c\uff0c\u95fd\u53bf\u9644\u90ed\u3002\u4e1c\u81f3\u6d77\uff0c\u897f\u81f3\u5ef6\u5e73\u5e9c\u53e4\u7530\u53bf\u754c...', match: 0.98 },
    { id: 102, title: '\u798f\u5dde\u5730\u8c8c', chapter: '\u5730\u7406\u5377 \u00b7 \u798f\u5efa\u81ea\u7136\u5730\u7406', snippet: '\u798f\u5dde\u76c6\u5730\u5904\u4e8e\u95fd\u6c5f\u4e0b\u6e38\uff0c\u56db\u5468\u5c71\u5cf6\u73af\u62b1\uff0c\u5177\u6709\u5178\u578b\u7684\u76c6\u5730\u7279\u5f81...', match: 0.85 },
  ];

  const articleContent = {
    title: { simp: '\u5988\u7956\u6587\u5316', trad: '\u5b6d\u7956\u6587\u5316' },
    chapter: { simp: '\u6d77\u6d0b\u6587\u5316\u5377 \u00b7 \u4fe1\u4ef0', trad: '\u6d77\u6d0b\u6587\u5316\u5377 \u00b7 \u4fe1\u4ef0' },
    imageCaption: { simp: '\u56fe1\uff1a\u65e9\u671f\u5988\u7956\u796d\u5178\u56fe\u793a\uff08\u9009\u81ea\u300a\u95fd\u53f0\u5386\u53f2\u56fe\u9274\u300b\uff09', trad: '\u57161\uff1a\u65e9\u671f\u5b6d\u7956\u796d\u5178\u5716\u793a\uff08\u9078\u81ea\u300a\u95fd\u53f0\u6b77\u53f2\u5716\u9a8c\u300b\uff09' },
    paragraphs: [
      {
        simp: '\u5988\u7956\u662f\u6d41\u4f20\u4e8e\u4e2d\u56fd\u6d77\u6d0b\u5730\u533a\u7684\u6c11\u95f4\u4fe1\u4ef0\u3002\u5988\u7956\u6587\u5316\u4f5c\u4e3a\u95fd\u53f0\u6587\u5316\u7684\u91cd\u8981\u7ec4\u6210\u90e8\u5206\uff0c\u6df1\u6df1\u683d\u6839\u4e8e\u4e24\u5cb8\u6c11\u4f17\u7684\u751f\u6d3b\u4e2d\u3002\u636e\u8bb0\u8f7d\uff0c\u5988\u7956\u539f\u540d\u6797\u9edb\uff0c\u5b8b\u4ee3\u798f\u5efa\u8386\u7530\u6f7c\u6d32\u5c9b\u4eba\u3002\u5979\u4e00\u751f\u884c\u5584\u79ef\u5fb7\uff0c\u6551\u52a9\u6d77\u96be\uff0c\u88ab\u5c0a\u4e3a\u201c\u6d77\u4e0a\u5973\u795e\u201d\u3002',
        trad: '\u5b6d\u7956\u662f\u6d41\u50b3\u65bc\u4e2d\u5706\u6d77\u6d0b\u5730\u5340\u7684\u6c11\u9593\u4fe1\u4ef0\u3002\u5b6d\u7956\u6587\u5316\u4f5c\u70ba\u95fd\u53f0\u6587\u5316\u7684\u91cd\u8981\u7d44\u6210\u90e8\u5206\uff0c\u6df1\u6df1\u6839\u6839\u65bc\u5169\u5cb8\u6c11\u773e\u7684\u751f\u6d3b\u4e2d\u3002\u64da\u8a18\u8f7d\uff0c\u5b6d\u7956\u539f\u540d\u6797\u9edb\uff0c\u5b8b\u4ee3\u798f\u5efa\u8386\u7530\u6f7c\u6d32\u5cf6\u4eba\u3002\u5979\u4e00\u751f\u884c\u5584\u7a4d\u5fb7\uff0c\u6551\u52a9\u6d77\u96be\uff0c\u88ab\u5c0a\u70ba\u300c\u6d77\u4e0a\u5973\u795e\u300d\u3002'
      },
      {
        simp: '\u5728\u53f0\u6e7e\uff0c\u5988\u7956\u4fe1\u4ef0\u6781\u4e3a\u666e\u904d\uff0c\u5927\u5927\u5c0f\u5c0f\u7684\u5988\u7956\u5e99\u904d\u5e03\u5404\u5e02\u9547\u4e61\u6751\u3002\u6bcf\u5e74\u7684\u201c\u5988\u7956\u7ed5\u5883\u201d\u6d3b\u52a8\u66f4\u662f\u89c4\u6a21\u5b8f\u5927\uff0c\u88ab\u8ba4\u4e3a\u5168\u7403\u4e09\u5927\u5b97\u6559\u76db\u4e8b\u4e4b\u4e00\u3002\u4e24\u5cb8\u5988\u7956\u6587\u5316\u540c\u6839\u540c\u6e90\uff0c\u8fd1\u5e74\u6765\uff0c\u53f0\u6e7e\u6578\u767e\u5bb6\u5bab\u5e99\u7684\u4fe1\u4f17\u591a\u6b21\u8d74\u6f7c\u6d32\u5c9b\u8c16\u7956\u8fdb\u9999\uff0c\u6210\u4e3a\u95fd\u53f0\u6587\u5316\u4ea4\u6d41\u7684\u91cd\u8981\u7ef4\u5e26\u3002',
        trad: '\u5728\u53f0\u7063\uff0c\u5b6d\u7956\u4fe1\u4ef0\u6975\u70ba\u666e\u904d\uff0c\u5927\u5927\u5c0f\u5c0f\u7684\u5b6d\u7956\u5b99\u904d\u4f48\u5404\u5e02\u93ae\u9109\u6751\u3002\u6bcf\u5e74\u7684\u300c\u5b6d\u7956\u7e5e\u5883\u300d\u6d3b\u52d5\u66f4\u662f\u898f\u6a21\u5b8f\u5927\uff0c\u88ab\u8a8c\u70ba\u5168\u7403\u4e09\u5927\u5b97\u6559\u76db\u4e8b\u4e4b\u4e00\u3002\u5169\u5cb8\u5b6d\u7956\u6587\u5316\u540c\u6839\u540c\u6e90\uff0c\u8fd1\u5e74\u4f86\uff0c\u53f0\u7063\u6578\u767e\u5bb6\u5bae\u5b99\u7684\u4fe1\u773e\u591a\u6b21\u8d74\u6f7c\u6d32\u5cf6\u8c16\u7956\u9032\u9999\uff0c\u6210\u70ba\u95fd\u53f0\u6587\u5316\u4ea4\u6d41\u7684\u91cd\u8981\u7dad\u5e36\u3002'
      }
    ],
    tags: { simp: ['\u6c11\u4fd7', '\u4fe1\u4ef0', '\u6d77\u6d0b\u6587\u5316'], trad: ['\u6c11\u4fd7', '\u4fe1\u4ef0', '\u6d77\u6d0b\u6587\u5316'] }
  };

  const knowledgeBase = {
    '\u95fd\u5357\u8bed\u548c\u53f0\u8bed\u6709\u4ec0\u4e48\u533a\u522b\uff1f': {
      content: '\u6839\u636e\u300a\u95fd\u53f0\u6587\u5316\u5927\u8f91\u300b\u76f8\u5173\u8bb0\u8f7d\uff0c\u95fd\u5357\u8bed\u548c\u53f0\u8bed\u540c\u5c5e\u95fd\u5357\u8bed\u7cfb\u3002\u53f0\u6e7e\u95fd\u5357\u8bed\uff08\u53f0\u8bed\uff09\u4e3b\u8981\u6e90\u81ea\u798f\u5efa\u6cc9\u5dde\u548c\u6f33\u5dde\uff0c\u4f46\u5728\u957f\u671f\u7684\u5386\u53f2\u53d1\u5c55\u4e2d\uff0c\u53f0\u8bed\u5438\u6536\u4e86\u90e8\u5206\u5e73\u57e0\u65cf\u8bed\u8a00\u3001\u65e5\u8bed\u53ca\u5916\u6765\u8bed\u8bcd\u6c47\uff0c\u5728\u8bed\u97f3\u548c\u90e8\u5206\u7279\u8272\u8bcd\u6c47\u4e0a\u4e0e\u798f\u5efa\u672c\u571f\u95fd\u5357\u8bed\u4ea7\u751f\u4e86\u7ec6\u5c0f\u5dee\u5f02\uff0c\u4f46\u4e24\u8005\u6838\u5fc3\u8bcd\u6c47\u4e0e\u8bed\u6cd5\u4e00\u81f4\uff0c\u4f9d\u7136\u5b8c\u5168\u4e92\u901a\u3002',
      source: '\u8bed\u8a00\u5377 \u00b7 \u95fd\u53f0\u65b9\u8a00'
    },
    '\u4ecb\u7ecd\u4e00\u4e0b\u4e24\u5cb8\u5171\u540c\u7684\u5143\u5bb5\u4e60\u4fd7': {
      content: '\u300a\u95fd\u53f0\u6587\u5316\u5927\u8f91\u300b\u8bb0\u8f7d\uff0c\u4e24\u5cb8\u5143\u5bb5\u8282\u9664\u4e86\u8d4f\u82b1\u706f\u3001\u731c\u706f\u8c23\u3001\u5403\u6c64\u5706\u7b49\u5171\u540c\u4e60\u4fd7\u5916\uff0c\u5728\u95fd\u53f0\u5730\u533a\u8fd8\u6709\u72ec\u7279\u7684\u201c\u94bb\u706f\u811a\u201d\uff08\u5寓\u610f\u79f8\u7948\u751f\u5b50\uff09\u4ee5\u53ca\u76db\u5927\u7684\u201c\u8fce\u795e\u8d5b\u4f1a\u201d\u3002\u4f8b\u5982\u53f0\u6e7e\u7684\u201c\u76d0\u6c34\u870a\u70ae\u201d\u3001\u201c\u5e73\u6e56\u5929\u706f\u201d\u4e0e\u798f\u5efa\u672c\u571f\u7684\u201c\u6e38\u795e\u201d\u3001\u201c\u8e0f\u8861\u201d\u6d3b\u52a8\uff0c\u540c\u6839\u540c\u6e90\uff0c\u90fd\u662f\u5143\u5bb5\u671f\u95f4\u91cd\u8981\u7684\u6c11\u4fd7\u72c2\u6b22\u3002',
      source: '\u6c11\u4fd7\u5377 \u00b7 \u4f20\u7edf\u8282\u65e5'
    },
    '\u5988\u7956\u6587\u5316\u5728\u95fd\u53f0\u4e24\u5730\u662f\u5982\u4f55\u4f20\u627f\u7684\uff1f': {
      content: '\u6839\u636e\u300a\u95fd\u53f0\u6587\u5316\u5927\u8f91\u300b\u76f8\u5173\u8bb0\u8f7d\uff0c\u5988\u7956\u6587\u5316\u5728\u4e24\u5730\u7684\u4f20\u627f\u4e3b\u8981\u4f53\u73b0\u5728\uff1a\n\n1. \u796d\u7940\u4eea\u5178\uff1a\u6f7c\u6d32\u7956\u5b99\u4e0e\u53f0\u6e7e\u5404\u5927\u5988\u7956\u5b99\u4fdd\u6301\u7740\u5bc6\u5207\u7684\u201c\u5206\u7075\u201d\u5173\u7cfb\u3002\n2. \u6c11\u4fd7\u6d3b\u52a8\uff1a\u5305\u542b\u76db\u5927\u7684\u7ed5\u5883\u5de1\u5b89\u3001\u8fdb\u9999\u7948\u798f\u7b49\u3002\n3. \u6587\u5316\u8ba4\u540c\uff1a\u5988\u7956\u4f5c\u4e3a\u201c\u6d77\u4e0a\u5973\u795e\u201d\uff0c\u662f\u4e24\u5cb8\u6c11\u4f17\u7684\u5171\u540c\u4fdd\u62a4\u795e\uff0c\u6210\u4e3a\u6df1\u539a\u7684\u60c5\u611f\u8fde\u63a5\u7ef4\u7eb9\u3002',
      source: '\u6d77\u6d0b\u6587\u5316\u5377 \u00b7 \u4fe1\u4ef0'
    }
  };

  const renderHighlightedText = (text, highlightStr) => {
    if (!highlightStr) return text;
    const parts = text.split(highlightStr);
    return parts.map((part, i) => (
      <span key={i}>
        {part}
        {i !== parts.length - 1 && <span style={{background:'#fef08a', color:'#111827', padding:'0 2px', borderRadius:'3px', fontWeight:'500'}}>{highlightStr}</span>}
      </span>
    ));
  };

  const handleSendQuestion = (text) => {
    if (!text.trim()) return;
    const newUserMsg = { id: Date.now(), role: 'user', content: text };
    setChatHistory(prev => [...prev, newUserMsg]);
    setChatInput('');
    setTimeout(() => {
      const answer = knowledgeBase[text] || {
        content: '\u5173\u4e8e\u8fd9\u4e2a\u95ee\u9898\uff0c\u300a\u95fd\u53f0\u6587\u5316\u5927\u8f91\u300b\u4e2d\u6682\u65f6\u6ca1\u6709\u76f4\u63a5\u5bf9\u5e94\u7684\u8bcd\u6761\u8bb0\u8f7d\u3002\u60a8\u53ef\u4ee5\u5c1d\u8bd5\u63d0\u95ee\u4e0a\u65b9\u793a\u4f8b\u4e2d\u7684\u95ee\u9898\u3002',
        source: '\u667a\u80fd\u68c0\u7d22\u5f15\u64ce'
      };
      const newAiMsg = { id: Date.now() + 1, role: 'ai', type: 'answer', ...answer };
      setChatHistory(prev => [...prev, newAiMsg]);
    }, 600);
  };

  useEffect(() => {
    if (activeTab === 'ai' && chatEndRef.current) {
      chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
    }
  }, [chatHistory, activeTab]);

  const langKey = isTraditional ? 'trad' : 'simp';
  const textSizeClass = fontSize === 'large' ? 'text-lg leading-loose' : 'text-base leading-relaxed';

  const renderHome = () => (
    <div className="flex flex-col h-full bg-slate-50">
      <div className="bg-[#B91C1C] text-white p-6 pt-12 rounded-b-3xl shadow-lg relative">
        <h1 className="text-2xl font-bold mb-2">\u95fd\u53f0\u6587\u5316\u5927\u8f91</h1>
        <p className="text-red-100 text-sm opacity-80 italic">\u6570\u5b57\u5316\u9605\u8bfb\u4e0e\u68c0\u7d22\u5e73\u53f0</p>
        <div className="mt-6 flex bg-white rounded-full px-4 py-3 items-center shadow-inner">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-2 shrink-0"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" placeholder="\u641c\u8bcd\u6761\u3001\u641c\u5386\u53f2\u3001\u641c\u6c11\u4fd7..." className="bg-transparent border-none outline-none text-gray-800 placeholder:text-gray-400 w-full text-sm" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} onFocus={() => setIsSearching(true)} />
          {searchQuery && (
            <button onClick={() => setSearchQuery('')} className="shrink-0">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          )}
        </div>
      </div>
      <div className="flex-1 overflow-y-auto px-4 py-6">
        <h2 className="text-gray-800 font-bold border-l-4 border-[#B91C1C] pl-2 mb-4">\u5377\u76ee\u5bfc\u822a</h2>
        <div className="space-y-3">
          {categories.map((item) => (
            <div key={item.id} className="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex items-center justify-between cursor-pointer active:bg-slate-50" onClick={() => setActiveTab('reader')}>
              <div className="flex items-center space-x-4">
                <div className="w-10 h-10 bg-red-50 text-[#B91C1C] rounded-lg flex items-center justify-center font-bold">{item.title[0]}</div>
                <div>
                  <h3 className="text-gray-800 font-semibold">{item.title}</h3>
                  <p className="text-xs text-gray-400 truncate w-48">{item.sub}</p>
                </div>
              </div>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" strokeWidth="2"><polyline points="9 18 15 12 9 6"/></svg>
            </div>
          ))}
        </div>
      </div>
    </div>
  );

  const renderSearchResults = () => (
    <div className="flex flex-col h-full bg-white">
      <div className="p-4 pt-12 border-b flex items-center space-x-3">
        <button onClick={() => {setIsSearching(false); setSearchQuery('');}} className="p-1 -ml-1">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#374151" strokeWidth="2"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <div className="flex-1 bg-slate-100 rounded-full px-4 py-1.5 flex items-center">
          <input type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="bg-transparent w-full text-sm outline-none" autoFocus />
        </div>
      </div>
      <div className="flex-1 overflow-y-auto p-4">
        <div className="flex justify-between items-center mb-4 px-1">
          <span className="text-xs text-gray-500">\u627e\u5230 {searchResults.length} \u4e2a\u76f8\u5173\u8bcd\u6761</span>
          <span className="text-xs text-indigo-600 font-medium">\u6309\u5339\u914d\u5ea6\u6392\u5e8f</span>
        </div>
        <div className="space-y-4">
          {searchResults.map((res) => (
            <div key={res.id} className="p-4 border border-slate-100 rounded-xl active:bg-slate-50 cursor-pointer" onClick={() => {setIsSearching(false); setActiveTab('reader');}}>
              <div className="flex justify-between items-start mb-1">
                <h3 className="font-bold text-[#B91C1C]">{renderHighlightedText(res.title, searchQuery || '\u798f\u5dde')}</h3>
                <span className="text-[10px] bg-slate-100 text-gray-500 px-2 py-0.5 rounded">{res.chapter}</span>
              </div>
              <p className="text-xs text-gray-600 leading-relaxed mt-2">{renderHighlightedText(res.snippet, searchQuery || '\u798f\u5dde')}</p>
            </div>
          ))}
        </div>
      </div>
    </div>
  );

  const renderReader = () => (
    <div className="flex flex-col h-full bg-white">
      <div className="flex items-center justify-between p-4 pt-12 border-b">
        <button onClick={() => setActiveTab('home')} className="p-2 -ml-2">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#374151" strokeWidth="2"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <div className="flex space-x-2">
          <button onClick={() => setFontSize(fontSize === 'large' ? 'medium' : 'large')} className="px-2.5 py-1 text-xs border border-gray-200 rounded text-gray-600 font-medium active:bg-slate-50">A+</button>
          <button onClick={() => setIsTraditional(!isTraditional)} className={`px-2.5 py-1 text-xs border rounded font-medium transition-colors ${isTraditional ? 'bg-[#B91C1C] text-white border-[#B91C1C]' : 'border-gray-200 text-gray-600 active:bg-slate-50'}`}> {isTraditional ? '\u7e41\u4f53' : '\u7e41\u4f53'} </button>
        </div>
      </div>
      <div className="flex-1 overflow-y-auto">
        <div className="p-6">
          <h2 className="text-2xl font-bold text-gray-900 mb-2">{articleContent.title[langKey]}</h2>
          <p className="text-xs text-[#B91C1C] mb-6">{articleContent.chapter[langKey]}</p>
          <div className="mb-6 rounded-lg overflow-hidden border border-slate-100 bg-slate-50">
            <div className="aspect-video flex flex-col items-center justify-center text-gray-300">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              <span className="text-xs mt-2">\u8f91\u5178\u5386\u53f2\u5f71\u50cf\u8d44\u6e90\u52a0\u8f7d\u4e2d...</span>
            </div>
            <div className="p-2 text-center border-t border-slate-100 bg-white">
              <p className="text-[11px] text-gray-500">{articleContent.imageCaption[langKey]}</p>
            </div>
          </div>
          <div className={`text-gray-800 space-y-4 ${textSizeClass} text-justify`}>
            {articleContent.paragraphs.map((p, index) => (
              <p key={index} className="indent-8">{p[langKey]}</p>
            ))}
          </div>
          <div className="mt-8 pt-6 border-t border-slate-100 flex flex-wrap gap-2">
            {articleContent.tags[langKey].map(tag => (
              <span key={tag} className="px-3 py-1 bg-slate-50 border border-slate-100 text-slate-500 text-xs rounded-full">#{tag}</span>
            ))}
          </div>
        </div>
      </div>
      <div className="bg-white border-t px-4 py-3 pb-8 space-y-3 shadow-[0_-4px_15px_rgba(0,0,0,0.03)]">
        <div className="flex items-center justify-between border-b border-slate-50 pb-3">
          <button className="flex items-center text-sm text-gray-500 active:text-[#B91C1C]">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-0.5"><polyline points="15 18 9 12 15 6"/></svg>
            {isTraditional ? '\u4e0a\u4e00\u8bcd\u689d' : '\u4e0a\u4e00\u8bcd\u6761'}
          </button>
          <button className="flex items-center text-sm text-gray-500 active:text-[#B91C1C]">
            {isTraditional ? '\u4e0b\u4e00\u8bcd\u689d' : '\u4e0b\u4e00\u8bcd\u6761'}
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="ml-0.5"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
        <div className="flex items-center justify-between">
          <div className="flex items-center space-x-3">
            <button onClick={() => setIsPlaying(!isPlaying)} className="w-10 h-10 bg-[#B91C1C] text-white rounded-full flex items-center justify-center shadow-md active:scale-95 transition-transform">
              {isPlaying ? (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
              ) : (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style={{marginLeft:'2px'}}><polygon points="5 3 19 12 5 21 5 3"/></svg>
              )}
            </button>
            <div>
              <div className="flex items-center space-x-2">
                <span className="text-xs font-bold text-gray-700">{isTraditional ? '\u6b63\u5728\u6717\u8bfb' : '\u6b63\u5728\u6717\u8bfb'}</span>
                <select className="text-[10px] bg-slate-100 px-1 py-0.5 rounded outline-none border-r-4 border-transparent text-gray-600" value={audioLang} onChange={(e) => setAudioLang(e.target.value)}>
                  <option value="mandarin">{isTraditional ? '\u666e\u901a\u8bdd' : '\u666e\u901a\u8bdd'}</option>
                  <option value="minnan">{isTraditional ? '\u95fd\u5357\u8bed' : '\u95fd\u5357\u8bed'}</option>
                </select>
              </div>
              <p className="text-[10px] text-gray-400 mt-0.5">{isTraditional ? '\u8bed\u901f' : '\u8bed\u901f'} 1.0x</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  );

  const renderAI = () => (
    <div className="flex flex-col h-full bg-[#F8FAFC]">
      <div className="bg-white border-b p-4 pt-12 text-center shadow-sm relative z-10">
        <div className="flex justify-center items-center space-x-2">
          <div className="w-8 h-8 bg-indigo-600 rounded-full flex items-center justify-center text-white">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </div>
          <h2 className="font-bold text-gray-800">\u6587\u5316\u77e5\u8bc6\u52a9\u624b</h2>
        </div>
        <p className="text-[10px] text-gray-400 mt-1">\u57fa\u4e8e\u300a\u95fd\u53f0\u6587\u5316\u5927\u8f91\u300b\u77e5\u8bc6\u5e93</p>
      </div>
      <div className="flex-1 overflow-y-auto p-4 space-y-5 scroll-smooth">
        <div className="flex justify-center">
          <span className="bg-slate-200/60 text-slate-500 text-[10px] px-3 py-1 rounded-full">\u6b22\u8fce\u4f7f\u7528\uff0c\u60a8\u53ef\u4ee5\u8be2\u95ee\u5173\u4e8e\u95fd\u53f0\u6587\u5316\u3001\u5386\u53f2\u3001\u6c11\u4fd7\u7684\u95ee\u9898</span>
        </div>
        {chatHistory.map((msg) => (
          <div key={msg.id}>
            {msg.role === 'ai' ? (
              <div className="flex items-start space-x-3 mt-2">
                <div className="w-8 h-8 bg-indigo-100 rounded-full flex-shrink-0 flex items-center justify-center text-indigo-600 text-xs font-bold">AI</div>
                <div className="bg-white p-3.5 rounded-2xl rounded-tl-none shadow-sm border border-slate-100 max-w-[85%]">
                  {msg.type === 'welcome' && (
                    <>
                      <p className="text-sm text-gray-800">{msg.content}</p>
                      <div className="mt-3 space-y-2">
                        {msg.suggestions.map((sug, idx) => (
                          <button key={idx} onClick={() => handleSendQuestion(sug)} className="block w-full text-left text-xs text-indigo-600 bg-indigo-50/50 hover:bg-indigo-50 p-2 rounded-lg border border-indigo-100 transition-colors active:scale-[0.98]">"{sug}"</button>
                        ))}
                      </div>
                    </>
                  )}
                  {msg.type === 'answer' && (
                    <>
                      <div className="text-sm text-gray-800 leading-relaxed whitespace-pre-wrap">{msg.content}</div>
                      <div className="mt-3 flex justify-between items-center text-[10px] text-gray-400 border-t border-slate-100 pt-2">
                        <span>\u6765\u6e90\uff1a{msg.source}</span>
                        <button className="text-indigo-600 font-medium active:opacity-70">\u67e5\u770b\u539f\u6587</button>
                      </div>
                    </>
                  )}
                </div>
              </div>
            ) : (
              <div className="flex items-start flex-row-reverse space-x-3 space-x-reverse mt-2">
                <div className="w-8 h-8 bg-[#B91C1C] rounded-full flex-shrink-0 flex items-center justify-center text-white text-xs font-bold">\u6211</div>
                <div className="bg-[#B91C1C] text-white p-3 rounded-2xl rounded-tr-none shadow-sm max-w-[80%]">
                  <p className="text-sm leading-relaxed">{msg.content}</p>
                </div>
              </div>
            )}
          </div>
        ))}
        <div ref={chatEndRef} className="h-1" />
      </div>
      <div className="bg-white p-4 border-t flex items-center space-x-2 pb-8">
        <input type="text" value={chatInput} onChange={(e) => setChatInput(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && handleSendQuestion(chatInput)} placeholder="\u8f93\u5165\u60a8\u60f3\u4e86\u89e3\u7684\u95ee\u9898..." className="flex-1 bg-slate-100 rounded-full px-4 py-2 text-sm outline-none" />
        <button onClick={() => handleSendQuestion(chatInput)} className="w-10 h-10 bg-indigo-600 text-white rounded-full flex items-center justify-center shadow-md active:scale-95 transition-transform shrink-0">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{marginLeft:'1px'}}><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  );

  const renderProfile = () => (
    <div className="flex flex-col h-full bg-slate-50 overflow-y-auto">
      <div className="bg-white pt-16 pb-6 px-6">
        <div className="flex items-center space-x-4">
          <div className="w-16 h-16 bg-gradient-to-tr from-slate-200 to-slate-100 rounded-full flex items-center justify-center shadow-inner border border-slate-100">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" strokeWidth="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <div>
            <h2 className="text-lg font-bold text-gray-800">\u6587\u5316\u9605\u8bfb\u8005_9527</h2>
            <span className="inline-flex items-center mt-1 px-2 py-0.5 bg-slate-100 text-slate-500 text-[10px] rounded-full">\u666e\u901a\u7528\u6237</span>
          </div>
        </div>
      </div>
      <div className="px-4 -mt-2">
        <div className="bg-gradient-to-r from-[#2A2A2B] to-[#1A1A1A] rounded-2xl p-5 shadow-lg relative overflow-hidden">
          <div className="absolute top-0 right-0 w-32 h-32 bg-white/5 rounded-full -mr-10 -mt-10 blur-xl"></div>
          <div className="flex justify-between items-start relative z-10">
            <div className="text-[#F2D29E]">
              <div className="flex items-center space-x-2 mb-1">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.5 19h19l-.5-2.5L17 14l-2.5-6.5L12 11 9.5 7.5 7 14l-4 2.5L2.5 19z"/></svg>
                <h3 className="font-bold text-lg">\u8f91\u5178\u6570\u5b57\u4f1a\u5458</h3>
              </div>
              <p className="text-xs opacity-80">\u5f00\u901a\u4f1a\u5458\uff0c\u89e3\u9501\u8f91\u5178\u5168\u90e8\u77e5\u8bc6</p>
            </div>
            <button className="bg-gradient-to-r from-[#EED39A] to-[#D5B06C] text-[#332200] text-xs font-bold px-4 py-2 rounded-full shadow-md active:scale-95 transition-transform">\u7acb\u5373\u5f00\u901a</button>
          </div>
          <div className="mt-5 grid grid-cols-4 gap-2 text-center text-[#F2D29E]/80 relative z-10">
            {[
              {icon: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>, label: '\u5343\u4e07\u5b57\u7545\u8bfb'},
              {icon: <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>, label: '\u65b9\u8a00\u4f34\u8bfb'},
              {icon: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>, label: 'AI\u65e0\u9650\u95ee\u7b54'},
              {icon: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>, label: '\u7eb8\u4e66\u8054\u52a8'}
            ].map((item, i) => (
              <div key={i} className="flex flex-col items-center">
                <div className="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center mb-1">{item.icon}</div>
                <span className="text-[10px]">{item.label}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
      <div className="px-4 mt-4">
        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex items-center justify-between active:bg-slate-50 cursor-pointer">
          <div className="flex items-center space-x-3">
            <div className="w-10 h-10 bg-red-50 text-[#B91C1C] rounded-full flex items-center justify-center">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            </div>
            <div>
              <h4 className="text-sm font-bold text-gray-800">\u5df2\u8d2d\u7eb8\u4e66\u9a8c\u8bc1</h4>
              <p className="text-[10px] text-gray-500 mt-0.5">\u626b\u63cf\u300a\u95fd\u53f0\u6587\u5316\u5927\u8f91\u300b\u9632\u4f2a\u7801\u5151\u6362\u6743\u76ca</p>
            </div>
          </div>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" strokeWidth="2"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </div>
      <div className="px-4 mt-4 mb-20 space-y-3">
        <div className="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
          {[
            {icon: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>, label: '\u9605\u8bfb\u5386\u53f2'},
            {icon: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>, label: '\u6211\u7684\u8ba2\u5355'},
            {icon: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>, label: '\u8bbe\u7f6e\u4e0e\u5e2e\u52a9'}
          ].map((item, i, arr) => (
            <div key={i} className={`flex items-center justify-between p-4 ${i < arr.length - 1 ? 'border-b border-slate-50' : ''} active:bg-slate-50 cursor-pointer`}>
              <div className="flex items-center space-x-3 text-gray-700">
                <span className="text-gray-400">{item.icon}</span>
                <span className="text-sm">{item.label}</span>
              </div>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" strokeWidth="2"><polyline points="9 18 15 12 9 6"/></svg>
            </div>
          ))}
        </div>
      </div>
    </div>
  );

  return (
    <div className="flex items-center justify-center h-screen bg-slate-200">
      <div className="w-[375px] h-[760px] bg-white rounded-[40px] shadow-2xl overflow-hidden relative border-[8px] border-slate-800 flex flex-col">
        <div className="flex-1 overflow-hidden">
          {isSearching ? renderSearchResults() : (
            activeTab === 'home' ? renderHome() :
            activeTab === 'ai' ? renderAI() :
            activeTab === 'reader' ? renderReader() :
            activeTab === 'profile' ? renderProfile() : null
          )}
        </div>
        {!isSearching && (
          <div className="h-16 bg-white border-t flex items-center justify-around pb-2">
            {[
              {tab:'home', icon: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>, label: '\u8f91\u5178\u76ee\u5f55'},
              {tab:'ai', icon: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>, label: 'AI \u95ee\u7b54'},
              {tab:'profile', icon: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>, label: '\u6211\u7684\u6743\u76ca'}
            ].map(item => (
              <button key={item.tab} onClick={() => setActiveTab(item.tab)} className={`flex flex-col items-center space-y-1 ${activeTab === item.tab ? 'text-[#B91C1C]' : 'text-gray-400'}`}>
                {item.icon}
                <span className="text-[10px] font-bold">{item.label}</span>
              </button>
            ))}
          </div>
        )}
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
