<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>闽台文化大辞典</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // ── Inline SVG Icons ──────────────────────────────────────────────
    const BookOpen = ({size=20,className=''}) => (
      <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
    );
    const Search = ({size=20,className=''}) => (
      <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
    );
    const MessageSquare = ({size=20,className=''}) => (
      <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    );
    const User = ({size=20,className=''}) => (
      <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
    );
    const ChevronRight = ({size=20,className=''}) => (
      <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="m9 18 6-6-6-6"/>
      </svg>
    );
    const ChevronLeft = ({size=20,className=''}) => (
      <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="m15 18-6-6 6-6"/>
      </svg>
    );
    const Send = ({size=20,className=''}) => (
      <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/>
      </svg>
    );
    const Play = ({size=20,className=''}) => (
      <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </svg>
    );
    const Pause = ({size=20,className=''}) => (
      <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
      </svg>
    );
    const ArrowLeft = ({size=20,className=''}) => (
      <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>
      </svg>
    );

    // ── Mock Data ─────────────────────────────────────────────────────
    const categories = [
      { id: 1, title: '地理卷',       sub: '自然地理、历史地理、区划...' },
      { id: 2, title: '历史卷',       sub: '古代史、近现代史、重要事件...' },
      { id: 3, title: '民族与宗族卷', sub: '姓氏源流、移民迁徙、族谱...' },
      { id: 4, title: '思想与学术卷', sub: '儒学、书院文化、两岸交流...' },
      { id: 5, title: '文学卷',       sub: '古典文学、民间文学、现当代文学...' },
      { id: 6, title: '艺术卷',       sub: '戏曲、音乐、书法、雕塑...' },
      { id: 7, title: '海洋文化卷',   sub: '海上丝绸之路、妈祖信仰、造船...' },
    ];

    // ── App ───────────────────────────────────────────────────────────
    const App = () => {
      const [activeTab,     setActiveTab]     = useState('home');
      const [isTraditional, setIsTraditional] = useState(false);
      const [fontSize,      setFontSize]      = useState('medium');
      const [audioLang,     setAudioLang]     = useState('minnan');
      const [isPlaying,     setIsPlaying]     = useState(false);

      const content = {
        title: isTraditional ? '媽祖文化' : '妈祖文化',
        body: isTraditional
          ? "媽祖是流傳於中國沿海地區的民間信仰。媽祖文化作為閩台文化的重要組成部分，深深紮根於兩岸民眾的生活中。據記載，媽祖原名林默，宋代福建莆田湄洲島人。她一生行善積德，救助海難，被尊為「海上女神」。"
          : "妈祖是流传于中国沿海地区的民间信仰。妈祖文化作为闽台文化的重要组成部分，深深扎根于两岸民众的生活中。据记载，妈祖原名林默，宋代福建莆田湄洲岛人。她一生行善积德，救助海难，被尊为"海上女神"。",
        tags: ['民俗', '信仰', '海洋文化'],
      };

      const fontSizeClasses = { small:'text-sm', medium:'text-base', large:'text-lg', xlarge:'text-xl' };

      // ── Home ──────────────────────────────────────────────────────
      const renderHome = () => (
        <div className="flex flex-col h-full bg-slate-50">
          <div className="bg-[#B91C1C] text-white p-6 pt-12 rounded-b-3xl shadow-lg relative overflow-hidden">
            <div className="absolute top-0 right-0 opacity-10 w-32 h-32 border-[10px] border-white rounded-full -mr-16 -mt-16"></div>
            <h1 className="text-2xl font-bold mb-2">闽台文化大辞典</h1>
            <p className="text-red-100 text-sm opacity-80 italic">系统性地方文化百科 · 数字化平台</p>
            <div className="mt-6 flex bg-white/20 backdrop-blur-md rounded-full px-4 py-2 items-center">
              <Search size={18} className="text-white/70 mr-2" />
              <input type="text" placeholder="搜词条、搜历史、搜民俗..."
                className="bg-transparent border-none outline-none text-white placeholder-white/60 w-full text-sm" />
            </div>
          </div>

          <div className="flex-1 overflow-y-auto px-4 py-6">
            <div className="flex justify-between items-center mb-4">
              <h2 className="text-gray-800 font-bold border-l-4 border-[#B91C1C] pl-2">卷目导航</h2>
              <span className="text-xs text-gray-500">共 14 卷</span>
            </div>
            <div className="space-y-3">
              {categories.map(item => (
                <div key={item.id}
                  className="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex items-center justify-between cursor-pointer active:bg-slate-50 transition-colors"
                  onClick={() => setActiveTab('reader')}>
                  <div className="flex items-center space-x-4">
                    <div className="w-10 h-10 bg-blue-50 text-[#1E3A8A] rounded-lg flex items-center justify-center font-bold">
                      {item.title[0]}
                    </div>
                    <div>
                      <h3 className="text-gray-800 font-semibold">{item.title}</h3>
                      <p className="text-xs text-gray-500 truncate w-48">{item.sub}</p>
                    </div>
                  </div>
                  <ChevronRight size={18} className="text-gray-300" />
                </div>
              ))}
            </div>
          </div>
        </div>
      );

      // ── Reader ────────────────────────────────────────────────────
      const renderReader = () => (
        <div className="flex flex-col h-full bg-white">
          <div className="flex items-center justify-between p-4 pt-12 border-b">
            <button onClick={() => setActiveTab('home')} className="p-2"><ArrowLeft size={20} /></button>
            <h2 className="font-bold">{content.title}</h2>
            <div className="flex space-x-2">
              <button
                onClick={() => {
                  const sizes = ['small','medium','large','xlarge'];
                  const idx = sizes.indexOf(fontSize);
                  setFontSize(sizes[(idx + 1) % sizes.length]);
                }}
                className="px-2 py-1 text-xs border border-gray-300 rounded text-gray-600 font-medium active:bg-slate-50">
                A+
              </button>
              <button
                onClick={() => setIsTraditional(!isTraditional)}
                className="px-2 py-1 text-xs border border-gray-300 rounded text-gray-600 font-medium active:bg-slate-50">
                {isTraditional ? '简体' : '繁体'}
              </button>
            </div>
          </div>

          <div className="flex-1 overflow-y-auto p-6 leading-relaxed">
            <div className="mb-4 aspect-video bg-slate-100 rounded-xl flex items-center justify-center overflow-hidden border">
              <div className="text-gray-400 text-sm flex flex-col items-center">
                <span className="mb-2 text-2xl">🖼️</span>
                <span>妈祖祭典图示（辞典插图）</span>
              </div>
            </div>
            <div className={`text-gray-800 space-y-4 transition-all ${fontSizeClasses[fontSize]}`}>
              <p>{content.body}</p>
              <p>
                {isTraditional
                  ? "在台灣，媽祖信仰極為普遍，大大小小的媽祖廟遍布各市鎮鄉村。每年的「媽祖繞境」活動更是規模宏大，被譽為全球三大宗教盛事之一。"
                  : "在台湾，妈祖信仰极为普遍，大大小小的妈祖庙遍布各市镇乡村。每年的"妈祖绕境"活动更是规模宏大，被誉为全球三大宗教盛事之一。"}
              </p>
            </div>
            <div className="mt-10 pt-6 border-t flex flex-wrap gap-2">
              {content.tags.map(tag => (
                <span key={tag} className="px-3 py-1 bg-slate-100 text-slate-600 text-xs rounded-full">#{tag}</span>
              ))}
            </div>
          </div>

          {/* 底部工具栏 */}
          <div className="bg-white border-t px-4 py-3 pb-8 space-y-3 shadow-[0_-4px_10px_rgba(0,0,0,0.05)]">
            <div className="flex items-center justify-between border-b border-slate-50 pb-3">
              <button className="flex items-center text-sm text-gray-600 active:text-[#B91C1C] whitespace-nowrap transition-colors">
                <ChevronLeft size={16} className="mr-0.5" /> 上一词条
              </button>
              <span className="text-xs text-gray-400 truncate px-2">海洋文化卷</span>
              <button className="flex items-center text-sm text-gray-600 active:text-[#B91C1C] whitespace-nowrap transition-colors">
                下一词条 <ChevronRight size={16} className="ml-0.5" />
              </button>
            </div>
            <div className="flex items-center justify-between pt-1">
              <div className="flex items-center space-x-3">
                <button
                  onClick={() => setIsPlaying(!isPlaying)}
                  className="w-10 h-10 bg-[#B91C1C] text-white rounded-full flex items-center justify-center shadow-md active:scale-95 transition-transform shrink-0">
                  {isPlaying ? <Pause size={20} /> : <Play size={20} />}
                </button>
                <div className="flex flex-col justify-center">
                  <div className="flex items-center space-x-2">
                    <span className="text-xs font-bold text-gray-700">正在朗读</span>
                    <select
                      className="text-[10px] bg-slate-100 px-1 py-0.5 rounded outline-none"
                      value={audioLang}
                      onChange={e => setAudioLang(e.target.value)}>
                      <option value="mandarin">普通话</option>
                      <option value="minnan">闽南语 (台语)</option>
                    </select>
                  </div>
                  <p className="text-[10px] text-gray-400 mt-0.5">语速 1.0x</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      );

      // ── AI Chat ───────────────────────────────────────────────────
      const renderAI = () => (
        <div className="flex flex-col h-full bg-[#F8FAFC]">
          <div className="bg-white border-b p-4 pt-12 text-center">
            <div className="flex justify-center items-center space-x-2">
              <div className="w-8 h-8 bg-indigo-600 rounded-full flex items-center justify-center text-white">
                <MessageSquare size={16} />
              </div>
              <h2 className="font-bold">文化知识助手</h2>
            </div>
            <p className="text-[10px] text-gray-400 mt-1">基于《闽台文化大辞典》知识库</p>
          </div>

          <div className="flex-1 overflow-y-auto p-4 space-y-4">
            <div className="flex justify-center">
              <span className="bg-slate-200/50 text-slate-500 text-[10px] px-3 py-1 rounded-full">
                欢迎使用，您可以询问关于闽台文化、历史、民俗的任何问题
              </span>
            </div>

            {/* AI 回答 */}
            <div className="flex items-start space-x-3">
              <div className="w-8 h-8 bg-indigo-100 rounded-full flex-shrink-0 flex items-center justify-center text-indigo-600 font-bold text-xs">AI</div>
              <div className="bg-white p-3 rounded-2xl rounded-tl-none shadow-sm border max-w-[80%]">
                <p className="text-sm text-gray-800">您好！我是您的闽台文化小助手。有什么我可以帮您的吗？您可以问我：</p>
                <div className="mt-3 space-y-2">
                  <button className="block w-full text-left text-xs text-indigo-600 bg-indigo-50 p-2 rounded-lg border border-indigo-100">
                    "闽南语和台语有什么区别？"
                  </button>
                  <button className="block w-full text-left text-xs text-indigo-600 bg-indigo-50 p-2 rounded-lg border border-indigo-100">
                    "介绍一下两岸共同的元宵习俗"
                  </button>
                </div>
              </div>
            </div>

            {/* 用户提问 */}
            <div className="flex items-start flex-row-reverse space-x-3 space-x-reverse">
              <div className="w-8 h-8 bg-[#B91C1C] rounded-full flex-shrink-0 flex items-center justify-center text-white text-xs">我</div>
              <div className="bg-[#B91C1C] text-white p-3 rounded-2xl rounded-tr-none shadow-sm max-w-[80%]">
                <p className="text-sm">妈祖文化在闽台两地是如何传承的？</p>
              </div>
            </div>

            {/* AI 深度回答 */}
            <div className="flex items-start space-x-3">
              <div className="w-8 h-8 bg-indigo-100 rounded-full flex-shrink-0 flex items-center justify-center text-indigo-600 font-bold text-xs">AI</div>
              <div className="bg-white p-3 rounded-2xl rounded-tl-none shadow-sm border max-w-[80%]">
                <p className="text-sm text-gray-800 leading-relaxed">
                  根据《闽台文化大辞典》相关记载，妈祖文化在两地的传承主要体现在以下几个方面：
                  <br/><br/>
                  1. <b>祭祀仪典：</b>湄洲祖庙与台湾各大妈祖庙（如北港朝天宫）保持着密切的"分灵"关系。
                  <br/>
                  2. <b>民俗活动：</b>包含绕境巡安、烧香祈福等。
                  <br/>
                  3. <b>文化认同：</b>妈祖作为"海上女神"，是两岸渔民及航海者的共同保护神，成为情感连接的纽带。
                </p>
                <div className="mt-2 flex justify-between items-center text-[10px] text-gray-400 border-t pt-2">
                  <span>来源：辞典《海洋文化卷》- 妈祖词条</span>
                  <button className="text-indigo-600">查看原文</button>
                </div>
              </div>
            </div>
          </div>

          <div className="bg-white p-4 border-t flex items-center space-x-2">
            <div className="flex-1 bg-slate-100 rounded-full px-4 py-2 flex items-center">
              <input type="text" placeholder="输入您想了解的问题..."
                className="bg-transparent border-none outline-none w-full text-sm" />
            </div>
            <button className="w-10 h-10 bg-indigo-600 text-white rounded-full flex items-center justify-center shadow-md">
              <Send size={18} />
            </button>
          </div>
        </div>
      );

      // ── Shell ─────────────────────────────────────────────────────
      return (
        <div className="flex items-center justify-center min-h-screen bg-slate-200 font-sans p-4">
          <div className="w-[375px] h-[760px] bg-white rounded-[40px] shadow-2xl overflow-hidden relative border-[8px] border-slate-800 flex flex-col">
            <div className="flex-1 overflow-hidden">
              {activeTab === 'home'    && renderHome()}
              {activeTab === 'reader' && renderReader()}
              {activeTab === 'ai'     && renderAI()}
              {activeTab === 'profile' && (
                <div className="flex flex-col items-center justify-center h-full text-gray-500">
                  <User size={64} className="mb-4 text-gray-300" />
                  <p>个人中心页面开发中</p>
                  <button onClick={() => setActiveTab('home')} className="mt-4 text-[#B91C1C] text-sm font-bold">返回首页</button>
                </div>
              )}
            </div>

            {/* 底部导航 */}
            <div className="h-16 bg-white border-t flex items-center justify-around pb-2 shrink-0">
              {[
                { tab:'home',    Icon:BookOpen,      label:'辞典目录' },
                { tab:'reader',  Icon:Search,        label:'全文搜索' },
                { tab:'ai',      Icon:MessageSquare, label:'AI 问答' },
                { tab:'profile', Icon:User,          label:'我的权益' },
              ].map(({tab, Icon, label}) => (
                <button key={tab} onClick={() => setActiveTab(tab)}
                  className={`flex flex-col items-center space-y-1 transition-colors ${activeTab === tab ? 'text-[#B91C1C]' : 'text-gray-400'}`}>
                  <Icon size={20} />
                  <span className="text-[10px] font-bold">{label}</span>
                </button>
              ))}
            </div>

            {/* 底部指示条 */}
            <div className="absolute bottom-1 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-slate-200 rounded-full"></div>
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
