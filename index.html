/**
 * 安全的文本高亮函数 - 修复原始代码中的逻辑问题
 * 1. 转义正则特殊字符，避免搜索"福州."等时出错
 * 2. 使用正则全局匹配，支持多次高亮
 * 3. 空字符串保护
 */
function renderHighlightedText(text, highlightStr) {
  if (!highlightStr || !text) return text;
  // 转义正则特殊字符
  const escaped = highlightStr.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const regex = new RegExp(`(${escaped})`, 'gi');
  const parts = text.split(regex);
  return parts.map((part, i) => {
    const isMatch = part.toLowerCase() === highlightStr.toLowerCase();
    return isMatch ? (
      <span key={i} className="highlight-match">{part}</span>
    ) : (
      <span key={i}>{part}</span>
    );
  });
}

/**
 * 模糊匹配知识库 - 修复原始代码只能精确匹配的问题
 */
function findBestAnswer(query) {
  if (!query.trim()) return null;
  const q = query.trim();

  // 1. 精确匹配
  if (KNOWLEDGE_BASE[q]) {
    return { ...KNOWLEDGE_BASE[q], matchType: 'exact' };
  }

  // 2. 包含匹配
  for (const [key, value] of Object.entries(KNOWLEDGE_BASE)) {
    if (key.includes(q) || q.includes(key)) {
      return { ...value, matchType: 'partial' };
    }
  }

  // 3. 关键词匹配
  const keywords = q.split(/\s+/);
  for (const [key, value] of Object.entries(KNOWLEDGE_BASE)) {
    const matchCount = keywords.filter(kw => key.includes(kw)).length;
    if (matchCount >= Math.max(1, keywords.length * 0.5)) {
      return { ...value, matchType: 'keyword' };
    }
  }

  return null;
}

/**
 * 音频播放按钮组件 - 修复原始代码仅有UI状态的问题
 * 实际调用Web Speech API进行语音朗读
 */
function AudioPlayer({ isPlaying, onToggle, lang, onLangChange, isTraditional, voiceReady }) {
  const [currentTime, setCurrentTime] = useState(0);
  const [voiceInfo, setVoiceInfo] = useState('');
  const intervalRef = useRef(null);

  // 检测当前可用的 zh-TW 语音
  useEffect(() => {
    if (!('speechSynthesis' in window)) {
      setVoiceInfo(isTraditional ? '不支援語音' : '不支持语音');
      return;
    }
    const checkVoices = () => {
      const voices = window.speechSynthesis.getVoices();
      const twVoice = voices.find(v => v.lang === 'zh-TW');
      if (twVoice) {
        setVoiceInfo(twVoice.name.split(' ').pop() || 'zh-TW');
      } else {
        const zhVoice = voices.find(v => v.lang.startsWith('zh'));
        setVoiceInfo(zhVoice ? (isTraditional ? '中文語音' : '中文语音') : (isTraditional ? '無語音引擎' : '无语音引擎'));
      }
    };
    checkVoices();
    window.speechSynthesis.onvoiceschanged = checkVoices;
  }, [isTraditional, lang]);

  useEffect(() => {
    if (isPlaying) {
      intervalRef.current = setInterval(() => {
        setCurrentTime(t => t + 1);
      }, 1000);
    } else {
      setCurrentTime(0);
      if (intervalRef.current) clearInterval(intervalRef.current);
    }
    return () => {
      if (intervalRef.current) clearInterval(intervalRef.current);
    };
  }, [isPlaying]);

  const formatTime = (s) => {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${m}:${sec.toString().padStart(2, '0')}`;
  };

  return (
    <div className="flex items-center justify-between">
      <div className="flex items-center space-x-3">
        <button
          onClick={onToggle}
          className="w-11 h-11 bg-[#B91C1C] text-white rounded-full flex items-center justify-center shadow-md btn-press"
          aria-label={isPlaying ? '暂停朗读' : '开始朗读'}
        >
          {isPlaying ? (
            <div className="flex items-center space-x-0.5">
              <div className="w-1 h-4 bg-white rounded-full sound-bar" />
              <div className="w-1 h-4 bg-white rounded-full sound-bar" />
              <div className="w-1 h-4 bg-white rounded-full sound-bar" />
            </div>
          ) : (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style={{marginLeft:'2px'}}>
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
          )}
        </button>
        <div>
          <div className="flex items-center space-x-2">
            <span className="text-xs font-bold text-gray-700">
              {isPlaying ? (isTraditional ? '正在朗讀' : '正在朗读') : (isTraditional ? '點擊朗讀' : '点击朗读')}
            </span>
            <select
              className="text-[10px] bg-slate-100 px-2 py-0.5 rounded outline-none border-r-4 border-transparent text-gray-600"
              value={lang}
              onChange={(e) => onLangChange(e.target.value)}
            >
              <option value="mandarin">{isTraditional ? '普通話' : '普通话'}</option>
              <option value="minnan">{isTraditional ? '閩南語' : '闽南语'}</option>
            </select>
          </div>
          <p className="text-[10px] text-gray-400 mt-0.5">
            {isPlaying ? formatTime(currentTime) : (lang === 'minnan' ? `zh-TW · ${voiceInfo}` : `zh-CN · ${voiceInfo}`)}
          </p>
        </div>
      </div>
    </div>
  );
}

    profile: (
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    ),
  };

  return (
    <div className="h-16 bg-white/95 backdrop-blur-md border-t border-slate-100 flex items-center justify-around pb-2 z-50">
      {tabs.map(item => {
        const isActive = activeTab === item.tab;
        return (
          <button
            key={item.tab}
            onClick={() => onTabChange(item.tab)}
            className={`flex flex-col items-center space-y-1 px-4 py-1 rounded-xl transition-all duration-300 ${
              isActive ? 'text-[#B91C1C] nav-item-active' : 'text-gray-400 hover:text-gray-500'
            }`}
          >
            <span className="nav-icon">{icons[item.tab]}</span>
            <span className="text-[10px] font-bold tracking-wide">{item.label}</span>
          </button>
        );
      })}
    </div>
  );
}

// ==================== 主应用组件 ====================

const App = () => {
  const [activeTab, setActiveTab] = useState('home');
  const [isTraditional, setIsTraditional] = useState(false);
  const [fontSize, setFontSize] = useState('medium');
  const [audioLang, setAudioLang] = useState('minnan');
  const [isPlaying, setIsPlaying] = useState(false);
  const [searchQuery, setSearchQuery] = useState('');
  const [isSearching, setIsSearching] = useState(false);
  const [currentArticleIndex, setCurrentArticleIndex] = useState(0);

  const chatEndRef = useRef(null);
  const searchInputRef = useRef(null);
  const [chatInput, setChatInput] = useState('');
  const [chatHistory, setChatHistory] = useState([
    {
      id: generateId(),
      role: 'ai',
      type: 'welcome',
      content: '您好！我是您的闽台文化小助手。有什么我可以帮您的吗？您可以问我：',
      suggestions: SUGGESTIONS.slice(0, 3)
    }
  ]);
  const [isAiTyping, setIsAiTyping] = useState(false);

  const langKey = isTraditional ? 'trad' : 'simp';
  const textSizeClass = fontSize === 'large' ? 'text-lg leading-loose' : 'text-base leading-relaxed';

  // ==================== 语音朗读功能 ====================
  const [voiceReady, setVoiceReady] = useState(false);

  // 预加载语音列表
  useEffect(() => {
    if (!('speechSynthesis' in window)) return;
    const loadVoices = () => {
      const voices = window.speechSynthesis.getVoices();
      if (voices.length > 0) setVoiceReady(true);
    };
    loadVoices();
    window.speechSynthesis.onvoiceschanged = () => {
      loadVoices();
      setVoiceReady(true);
    };
  }, []);

  // 根据语言选择最佳语音
  const getBestVoice = useCallback((lang) => {
    if (!('speechSynthesis' in window)) return null;
    const voices = window.speechSynthesis.getVoices();
    if (voices.length === 0) return null;

    const targetLang = lang === 'minnan' ? 'zh-TW' : 'zh-CN';

    // 1. 精确匹配语言标签
    const exactMatch = voices.find(v => v.lang === targetLang);
    if (exactMatch) return exactMatch;

    // 2. 前缀匹配 (zh-TW, zh-Hant 等)
    const prefix = targetLang.split('-')[0];
    const subtag = targetLang.split('-')[1];
    const prefixMatch = voices.find(v => {
      const vParts = v.lang.split('-');
      return vParts[0] === prefix && vParts[1] && vParts[1].startsWith(subtag);
    });
    if (prefixMatch) return prefixMatch;

    // 3. 同语系匹配 (zh-* 系列)
    const familyMatch = voices.find(v => v.lang.startsWith(prefix));
    if (familyMatch) return familyMatch;

    return null;
  }, []);

  const toggleAudio = useCallback(() => {
    if ('speechSynthesis' in window) {
      if (isPlaying) {
        window.speechSynthesis.cancel();
        setIsPlaying(false);
      } else {
        const text = ARTICLE_CONTENT.paragraphs.map(p => p[langKey]).join('\n');
        const utterance = new SpeechSynthesisUtterance(text);
        const targetLang = audioLang === 'minnan' ? 'zh-TW' : 'zh-CN';
        utterance.lang = targetLang;
        utterance.rate = audioLang === 'minnan' ? 0.85 : 1.0;

        // 尝试指定具体语音引擎
        const voice = getBestVoice(audioLang);
        if (voice) {
          utterance.voice = voice;
        }

        utterance.onend = () => setIsPlaying(false);
        utterance.onerror = () => setIsPlaying(false);
        window.speechSynthesis.speak(utterance);
        setIsPlaying(true);
      }
    } else {
      alert('您的浏览器不支持语音朗读功能');
    }
  }, [isPlaying, langKey, audioLang, getBestVoice]);

  // 切换页面时停止朗读
  useEffect(() => {
    if (activeTab !== 'reader' && isPlaying) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
      }
      setIsPlaying(false);
    }
  }, [activeTab]);

  // ==================== 搜索功能 ====================
  const handleSearchFocus = () => {
    setIsSearching(true);
    setTimeout(() => searchInputRef.current?.focus(), 100);
  };

  const handleSearchBack = () => {
    setIsSearching(false);
    setSearchQuery('');

      )

  // ==================== AI问答功能 ====================

                          来源：{msg.source}
                        </span>
                        <button className="text-indigo-600 font-medium hover:text-indigo-700 transition-colors">

                      </div>
                    </>
                  )}

              </div>
            ) : (
              <div className="flex items-start flex-row-reverse space-x-3 space-x-reverse mt-2">
                <div className="w-8 h-8 bg-[#B91C1C] rounded-full flex-shrink-0 flex items-center justify-center text-white text-xs font-bold shadow-sm">

                </div>
                <div className="bg-[#B91C1C] text-white p-3 rounded-2xl rounded-tr-none shadow-sm max-w-[80%]">
                  <p className="text-sm leading-relaxed">{msg.content}</p>
                </div>
              </div>
            )}
          </div>
        ))}

        {/* AI正在输入指示器 */}
        {isAiTyping && (
          <div className="flex items-start space-x-3 mt-2 msg-bubble">
            <div className="w-8 h-8 bg-indigo-100 rounded-full flex-shrink-0 flex items-center justify-center text-indigo-600 text-xs font-bold shadow-sm">

            <div className="bg-white p-3.5 rounded-2xl rounded-tl-none shadow-sm border border-slate-100">

                <div className="w-2 h-2 bg-gray-300 rounded-full animate-pulse" />
                <div className="w-2 h-2 bg-gray-300 rounded-full animate-pulse" style={{animationDelay:'0.2s'}} />
                <div className="w-2 h-2 bg-gray-300 rounded-full animate-pulse" style={{animationDelay:'0.4s'}} />
              </div>
            </div>
          </div>
        )}

        <div ref={chatEndRef} className="h-1" />
      </div>

      {/* 输入框 */}
      <div className="bg-white p-4 border-t border-slate-100 flex items-center space-x-2 pb-8">
        <input
          type="text"
          value={chatInput}
          onChange={(e) => setChatInput(e.target.value)}
          onKeyPress={(e) => e.key === 'Enter' && handleSendQuestion(chatInput)}
          placeholder="输入您想了解的问题..."
          className="flex-1 bg-slate-100 rounded-full px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-indigo-100 transition-all"
        />
        <button
          onClick={() => handleSendQuestion(chatInput)}
          disabled={!chatInput.trim() || isAiTyping}
          className={`w-10 h-10 rounded-full flex items-center justify-center shadow-md btn-press shrink-0 transition-all ${
            chatInput.trim() && !isAiTyping

        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{marginLeft:'1px'}}>
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>

                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">

      <div className="px-4 mt-4">
        <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex items-center justify-between card-hover cursor-pointer">
          <div className="flex items-center space-x-3">
            <div className="w-10 h-10 bg-red-50 text-[#B91C1C] rounded-full flex items-center justify-center">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">

            <polyline points="9 18 15 12 9 6"/>

      </div>

      {/* 功能列表 */}
      <div className="px-4 mt-4 mb-20 space-y-3">
        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">

            {

                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">

                  <circle cx="12" cy="12" r="3"/>
                  <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>

              label: '设置与帮助'

          ].map((item, i, arr) => (
            <div
              key={i}
              className={`flex items-center justify-between p-4 ${i < arr.length - 1 ? 'border-b border-slate-50' : ''} card-hover cursor-pointer`}
            >
              <div className="flex items-center space-x-3 text-gray-700">
                <span className="text-gray-400">{item.icon}</span>
                <span className="text-sm">{item.label}</span>
              </div>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="9 18 15 12 9 6"/>

  // ==================== 主渲染 ====================
  return (
    <div className="flex items-center justify-center h-screen bg-slate-200">
      <div className="w-[375px] h-[760px] bg-white rounded-[40px] shadow-2xl overflow-hidden relative border-[8px] border-slate-800 flex flex-col">
        {/* 手机顶部刘海装饰 */}
        <div className="absolute top-0 left-1/2 -translate-x-1/2 w-28 h-6 bg-slate-800 rounded-b-2xl z-50" />

        <div className="flex-1 overflow-hidden">
          {isSearching ? renderSearchResults() : (
            activeTab === 'home' ? renderHome() :
            activeTab === 'ai' ? renderAI() :
            activeTab === 'reader' ? renderReader() :
            activeTab === 'profile' ? renderProfile() : null
          )}
        </div>

        <BottomNav
          activeTab={activeTab}
          onTabChange={setActiveTab}
          hidden={isSearching}
        />
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
