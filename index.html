<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>闽台文化大辞典</title>
<script src="./react.production.min.js" crossorigin></script>
<script src="./react-dom.production.min.js" crossorigin></script>
<script src="./babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  .indent-8 { text-indent: 2em; }
  .scroll-smooth { scroll-behavior: smooth; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const App = () => {
  const [activeTab, setActiveTab] = useState('home');
  const [isTraditional, setIsTraditional] = useState(false);
  const [fontSize, setFontSize] = useState('medium');
  const [audioLang, setAudioLang] = useState('minnan');
  const [isPlaying, setIsPlaying] = useState(false);
  const [searchQuery, setSearchQuery] = useState('');
  const [isSearching, setIsSearching] = useState(false);

  const chatEndRef = useRef(null);
  const [chatInput, setChatInput] = useState('');
  const [chatHistory, setChatHistory] = useState([
    {
      id: 1,
      role: 'ai',
      type: 'welcome',
      content: '您好！我是您的闽台文化小助手。有什么我可以帮您的吗？您可以问我：',
      suggestions: [
        '闽南语和台语有什么区别？',
        '介绍一下两岸共同的元宵习俗',
        '妈祖文化在闽台两地是如何传承的？'
      ]
    }
  ]);

  const categories = [
    { id: 1, title: '地理卷', sub: '福建自然地理、台湾自然地理...' },
    { id: 2, title: '历史卷', sub: '古代史、近现代史、重要事件...' },
    { id: 3, title: '民族与宗族卷', sub: '姓氏源流、移民迁岙、族谱...' },
    { id: 4, title: '海洋文化卷', sub: '海上丝绸之路、妈祖信仰、造船...' },
  ];

  const searchResults = [
    { id: 101, title: '福州府', chapter: '地理卷 · 福建历史地理', snippet: '福州府，闽县附郭。东至海，西至延平府古田县界...', match: 0.98 },
    { id: 102, title: '福州地貌', chapter: '地理卷 · 福建自然地理', snippet: '福州盆地处于闽江下游，四周山島环抱，具有典型的盆地特征...', match: 0.85 },
  ];

  const articleContent = {
    title: { simp: '妈祖文化', trad: '孭祖文化' },
    chapter: { simp: '海洋文化卷 · 信仰', trad: '海洋文化卷 · 信仰' },
    imageCaption: { simp: '图1：早期妈祖祭典图示（选自《闽台历史图鉴》）', trad: '圖1：早期孭祖祭典圖示（選自《闽台歷史圖验》）' },
    paragraphs: [
      {
        simp: '妈祖是流传于中国海洋地区的民间信仰。妈祖文化作为闽台文化的重要组成部分，深深栽根于两岸民众的生活中。据记载，妈祖原名林黛，宋代福建莆田潼洲岛人。她一生行善积德，救助海难，被尊为“海上女神”。',
        trad: '孭祖是流傳於中圆海洋地區的民間信仰。孭祖文化作為闽台文化的重要組成部分，深深根根於兩岸民眾的生活中。據記载，孭祖原名林黛，宋代福建莆田潼洲島人。她一生行善積德，救助海难，被尊為「海上女神」。'
      },
      {
        simp: '在台湾，妈祖信仰极为普遍，大大小小的妈祖庙遍布各市镇乡村。每年的“妈祖绕境”活动更是规模宏大，被认为全球三大宗教盛事之一。两岸妈祖文化同根同源，近年来，台湾數百家宫庙的信众多次赴潼洲岛谖祖进香，成为闽台文化交流的重要维带。',
        trad: '在台灣，孭祖信仰極為普遍，大大小小的孭祖宙遍佈各市鎮鄉村。每年的「孭祖繞境」活動更是規模宏大，被誌為全球三大宗教盛事之一。兩岸孭祖文化同根同源，近年來，台灣數百家宮宙的信眾多次赴潼洲島谖祖進香，成為闽台文化交流的重要維帶。'
      }
    ],
    tags: { simp: ['民俗', '信仰', '海洋文化'], trad: ['民俗', '信仰', '海洋文化'] }
  };

  const knowledgeBase = {
    '闽南语和台语有什么区别？': {
      content: '根据《闽台文化大辑》相关记载，闽南语和台语同属闽南语系。台湾闽南语（台语）主要源自福建泉州和漳州，但在长期的历史发展中，台语吸收了部分平埠族语言、日语及外来语词汇，在语音和部分特色词汇上与福建本土闽南语产生了细小差异，但两者核心词汇与语法一致，依然完全互通。',
      source: '语言卷 · 闽台方言'
    },
    '介绍一下两岸共同的元宵习俗': {
      content: '《闽台文化大辑》记载，两岸元宵节除了赏花灯、猜灯谣、吃汤圆等共同习俗外，在闽台地区还有独特的“钻灯脚”（寓意祈求子）以及盛大的“迎神赛会”。例如台湾的“盐水蜊炮”、“平湖天灯”与福建本土的“游神”、“踏衡”活动，同根同源，都是元宵期间重要的民俗狂欢。',
      source: '民俗卷 · 传统节日'
    },
    '妈祖文化在闽台两地是如何传承的？': {
      content: '根据《闽台文化大辑》相关记载，妈祖文化在两地的传承主要体现在：\n\n1. 祭祀仪典：潼洲祖宙与台湾各大妈祖宙保持着密切的“分灵”关系。\n2. 民俗活动：包含盛大的绕境巡安、进香祈福等。\n3. 文化认同：妈祖作为“海上女神”，是两岸民众的共同保护神，成为深厚的情感连接维纹。',
      source: '海洋文化卷 · 信仰'
    }
  };

  const renderHighlightedText = (text, highlightStr) => {
    if (!highlightStr) return text;
    const parts = text.split(highlightStr);
    return parts.map((part, i) => (
      <span key={i}>
        {part}
        {i !== parts.length - 1 && <span style={{background:'#fef08a', color:'#111827', padding:'0 2px', borderRadius:'3px', fontWeight:'500'}}>{highlightStr}</span>}
      </span>
    ));
  };

  const handleSendQuestion = (text) => {
    if (!text.trim()) return;
    const newUserMsg = { id: Date.now(), role: 'user', content: text };
    setChatHistory(prev => [...prev, newUserMsg]);
    setChatInput('');
    setTimeout(() => {
      const answer = knowledgeBase[text] || {
        content: '关于这个问题，《闽台文化大辑》中暂时没有直接对应的词条记载。您可以尝试提问上方示例中的问题。',
        source: '智能检索引擎'
      };
      const newAiMsg = { id: Date.now() + 1, role: 'ai', type: 'answer', ...answer };
      setChatHistory(prev => [...prev, newAiMsg]);
    }, 600);
  };

  useEffect(() => {
    if (activeTab === 'ai' && chatEndRef.current) {
      chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
    }
  }, [chatHistory, activeTab]);

  const langKey = isTraditional ? 'trad' : 'simp';
  const textSizeClass = fontSize === 'large' ? 'text-lg leading-loose' : 'text-base leading-relaxed';

  const renderHome = () => (
    <div className="flex flex-col h-full bg-slate-50">
      <div className="bg-[#B91C1C] text-white p-6 pt-12 rounded-b-3xl shadow-lg relative">
        <h1 className="text-2xl font-bold mb-2">闽台文化大辑</h1>
        <p className="text-red-100 text-sm opacity-80 italic">数字化阅读与检索平台</p>
        <div className="mt-6 flex bg-white rounded-full px-4 py-3 items-center shadow-inner">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-2 shrink-0"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" placeholder="搜词条、搜历史、搜民俗..." className="bg-transparent border-none outline-none text-gray-800 placeholder:text-gray-400 w-full text-sm" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} onFocus={() => setIsSearching(true)} />
          {searchQuery && (
            <button onClick={() => setSearchQuery('')} className="shrink-0">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          )}
        </div>
      </div>
      <div className="flex-1 overflow-y-auto px-4 py-6">
        <h2 className="text-gray-800 font-bold border-l-4 border-[#B91C1C] pl-2 mb-4">卷目导航</h2>
        <div className="space-y-3">
          {categories.map((item) => (
            <div key={item.id} className="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex items-center justify-between cursor-pointer active:bg-slate-50" onClick={() => setActiveTab('reader')}>
              <div className="flex items-center space-x-4">
                <div className="w-10 h-10 bg-red-50 text-[#B91C1C] rounded-lg flex items-center justify-center font-bold">{item.title[0]}</div>
                <div>
                  <h3 className="text-gray-800 font-semibold">{item.title}</h3>
                  <p className="text-xs text-gray-400 truncate w-48">{item.sub}</p>
                </div>
              </div>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" strokeWidth="2"><polyline points="9 18 15 12 9 6"/></svg>
            </div>
          ))}
        </div>
      </div>
    </div>
  );

  const renderSearchResults = () => (
    <div className="flex flex-col h-full bg-white">
      <div className="p-4 pt-12 border-b flex items-center space-x-3">
        <button onClick={() => {setIsSearching(false); setSearchQuery('');}} className="p-1 -ml-1">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#374151" strokeWidth="2"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <div className="flex-1 bg-slate-100 rounded-full px-4 py-1.5 flex items-center">
          <input type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="bg-transparent w-full text-sm outline-none" autoFocus />
        </div>
      </div>
      <div className="flex-1 overflow-y-auto p-4">
        <div className="flex justify-between items-center mb-4 px-1">
          <span className="text-xs text-gray-500">找到 {searchResults.length} 个相关词条</span>
          <span className="text-xs text-indigo-600 font-medium">按匹配度排序</span>
        </div>
        <div className="space-y-4">
          {searchResults.map((res) => (
            <div key={res.id} className="p-4 border border-slate-100 rounded-xl active:bg-slate-50 cursor-pointer" onClick={() => {setIsSearching(false); setActiveTab('reader');}}>
              <div className="flex justify-between items-start mb-1">
                <h3 className="font-bold text-[#B91C1C]">{renderHighlightedText(res.title, searchQuery || '福州')}</h3>
                <span className="text-[10px] bg-slate-100 text-gray-500 px-2 py-0.5 rounded">{res.chapter}</span>
              </div>
              <p className="text-xs text-gray-600 leading-relaxed mt-2">{renderHighlightedText(res.snippet, searchQuery || '福州')}</p>
            </div>
          ))}
        </div>
      </div>
    </div>
  );

  const renderReader = () => (
    <div className="flex flex-col h-full bg-white">
      <div className="flex items-center justify-between p-4 pt-12 border-b">
        <button onClick={() => setActiveTab('home')} className="p-2 -ml-2">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#374151" strokeWidth="2"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <div className="flex space-x-2">
          <button onClick={() => setFontSize(fontSize === 'large' ? 'medium' : 'large')} className="px-2.5 py-1 text-xs border border-gray-200 rounded text-gray-600 font-medium active:bg-slate-50">A+</button>
          <button onClick={() => setIsTraditional(!isTraditional)} className={`px-2.5 py-1 text-xs border rounded font-medium transition-colors ${isTraditional ? 'bg-[#B91C1C] text-white border-[#B91C1C]' : 'border-gray-200 text-gray-600 active:bg-slate-50'}`}> {isTraditional ? '繁体' : '繁体'} </button>
        </div>
      </div>
      <div className="flex-1 overflow-y-auto">
        <div className="p-6">
          <h2 className="text-2xl font-bold text-gray-900 mb-2">{articleContent.title[langKey]}</h2>
          <p className="text-xs text-[#B91C1C] mb-6">{articleContent.chapter[langKey]}</p>
          <div className="mb-6 rounded-lg overflow-hidden border border-slate-100 bg-slate-50">
            <div className="aspect-video flex flex-col items-center justify-center text-gray-300">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              <span className="text-xs mt-2">辑典历史影像资源加载中...</span>
            </div>
            <div className="p-2 text-center border-t border-slate-100 bg-white">
              <p className="text-[11px] text-gray-500">{articleContent.imageCaption[langKey]}</p>
            </div>
          </div>
          <div className={`text-gray-800 space-y-4 ${textSizeClass} text-justify`}>
            {articleContent.paragraphs.map((p, index) => (
              <p key={index} className="indent-8">{p[langKey]}</p>
            ))}
          </div>
          <div className="mt-8 pt-6 border-t border-slate-100 flex flex-wrap gap-2">
            {articleContent.tags[langKey].map(tag => (
              <span key={tag} className="px-3 py-1 bg-slate-50 border border-slate-100 text-slate-500 text-xs rounded-full">#{tag}</span>
            ))}
          </div>
        </div>
      </div>
      <div className="bg-white border-t px-4 py-3 pb-8 space-y-3 shadow-[0_-4px_15px_rgba(0,0,0,0.03)]">
        <div className="flex items-center justify-between border-b border-slate-50 pb-3">
          <button className="flex items-center text-sm text-gray-500 active:text-[#B91C1C]">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-0.5"><polyline points="15 18 9 12 15 6"/></svg>
            {isTraditional ? '上一词條' : '上一词条'}
          </button>
          <button className="flex items-center text-sm text-gray-500 active:text-[#B91C1C]">
            {isTraditional ? '下一词條' : '下一词条'}
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="ml-0.5"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
        <div className="flex items-center justify-between">
          <div className="flex items-center space-x-3">
            <button onClick={() => setIsPlaying(!isPlaying)} className="w-10 h-10 bg-[#B91C1C] text-white rounded-full flex items-center justify-center shadow-md active:scale-95 transition-transform">
              {isPlaying ? (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
              ) : (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style={{marginLeft:'2px'}}><polygon points="5 3 19 12 5 21 5 3"/></svg>
              )}
            </button>
            <div>
              <div className="flex items-center space-x-2">
                <span className="text-xs font-bold text-gray-700">{isTraditional ? '正在朗读' : '正在朗读'}</span>
                <select className="text-[10px] bg-slate-100 px-1 py-0.5 rounded outline-none border-r-4 border-transparent text-gray-600" value={audioLang} onChange={(e) => setAudioLang(e.target.value)}>
                  <option value="mandarin">{isTraditional ? '普通话' : '普通话'}</option>
                  <option value="minnan">{isTraditional ? '闽南语' : '闽南语'}</option>
                </select>
              </div>
              <p className="text-[10px] text-gray-400 mt-0.5">{isTraditional ? '语速' : '语速'} 1.0x</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  );

  const renderAI = () => (
    <div className="flex flex-col h-full bg-[#F8FAFC]">
      <div className="bg-white border-b p-4 pt-12 text-center shadow-sm relative z-10">
        <div className="flex justify-center items-center space-x-2">
          <div className="w-8 h-8 bg-indigo-600 rounded-full flex items-center justify-center text-white">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </div>
          <h2 className="font-bold text-gray-800">文化知识助手</h2>
        </div>
        <p className="text-[10px] text-gray-400 mt-1">基于《闽台文化大辑》知识库</p>
      </div>
      <div className="flex-1 overflow-y-auto p-4 space-y-5 scroll-smooth">
        <div className="flex justify-center">
          <span className="bg-slate-200/60 text-slate-500 text-[10px] px-3 py-1 rounded-full">欢迎使用，您可以询问关于闽台文化、历史、民俗的问题</span>
        </div>
        {chatHistory.map((msg) => (
          <div key={msg.id}>
            {msg.role === 'ai' ? (
              <div className="flex items-start space-x-3 mt-2">
                <div className="w-8 h-8 bg-indigo-100 rounded-full flex-shrink-0 flex items-center justify-center text-indigo-600 text-xs font-bold">AI</div>
                <div className="bg-white p-3.5 rounded-2xl rounded-tl-none shadow-sm border border-slate-100 max-w-[85%]">
                  {msg.type === 'welcome' && (
                    <>
                      <p className="text-sm text-gray-800">{msg.content}</p>
                      <div className="mt-3 space-y-2">
                        {msg.suggestions.map((sug, idx) => (
                          <button key={idx} onClick={() => handleSendQuestion(sug)} className="block w-full text-left text-xs text-indigo-600 bg-indigo-50/50 hover:bg-indigo-50 p-2 rounded-lg border border-indigo-100 transition-colors active:scale-[0.98]">"{sug}"</button>
                        ))}
                      </div>
                    </>
                  )}
                  {msg.type === 'answer' && (
                    <>
                      <div className="text-sm text-gray-800 leading-relaxed whitespace-pre-wrap">{msg.content}</div>
                      <div className="mt-3 flex justify-between items-center text-[10px] text-gray-400 border-t border-slate-100 pt-2">
                        <span>来源：{msg.source}</span>
                        <button className="text-indigo-600 font-medium active:opacity-70">查看原文</button>
                      </div>
                    </>
                  )}
                </div>
              </div>
            ) : (
              <div className="flex items-start flex-row-reverse space-x-3 space-x-reverse mt-2">
                <div className="w-8 h-8 bg-[#B91C1C] rounded-full flex-shrink-0 flex items-center justify-center text-white text-xs font-bold">我</div>
                <div className="bg-[#B91C1C] text-white p-3 rounded-2xl rounded-tr-none shadow-sm max-w-[80%]">
                  <p className="text-sm leading-relaxed">{msg.content}</p>
                </div>
              </div>
            )}
          </div>
        ))}
        <div ref={chatEndRef} className="h-1" />
      </div>
      <div className="bg-white p-4 border-t flex items-center space-x-2 pb-8">
        <input type="text" value={chatInput} onChange={(e) => setChatInput(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && handleSendQuestion(chatInput)} placeholder="输入您想了解的问题..." className="flex-1 bg-slate-100 rounded-full px-4 py-2 text-sm outline-none" />
        <button onClick={() => handleSendQuestion(chatInput)} className="w-10 h-10 bg-indigo-600 text-white rounded-full flex items-center justify-center shadow-md active:scale-95 transition-transform shrink-0">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{marginLeft:'1px'}}><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  );

  const renderProfile = () => (
    <div className="flex flex-col h-full bg-slate-50 overflow-y-auto">
      <div className="bg-white pt-16 pb-6 px-6">
        <div className="flex items-center space-x-4">
          <div className="w-16 h-16 bg-gradient-to-tr from-slate-200 to-slate-100 rounded-full flex items-center justify-center shadow-inner border border-slate-100">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" strokeWidth="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <div>
            <h2 className="text-lg font-bold text-gray-800">文化阅读者_9527</h2>
