<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>闽台文化大辞典</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif; background: #e2e8f0; }
    input:focus { outline: none; }
    select:focus { outline: none; }
    button { cursor: pointer; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // ── 简易图标组件（SVG inline） ──────────────────────────
    const Icon = ({ path, size = 20, className = '', style = {} }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
        stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
        className={className} style={style}>
        <path d={path} />
      </svg>
    );
    const BookOpen    = ({size,className}) => <Icon size={size} className={className} path="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>;
    const Search      = ({size,className}) => <Icon size={size} className={className} path="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>;
    const MessageSq   = ({size,className}) => <Icon size={size} className={className} path="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>;
    const UserIcon    = ({size,className}) => <Icon size={size} className={className} path="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/>;
    const ChevronRight= ({size,className}) => <Icon size={size} className={className} path="M9 18l6-6-6-6"/>;
    const ArrowLeft   = ({size,className}) => <Icon size={size} className={className} path="M19 12H5M12 5l-7 7 7 7"/>;
    const Play        = ({size,className,style}) => <Icon size={size} className={className} style={style} path="M5 3l14 9-14 9V3z"/>;
    const Pause       = ({size,className}) => <Icon size={size} className={className} path="M6 4h4v16H6zM14 4h4v16h-4z"/>;
    const Settings    = ({size,className}) => <Icon size={size} className={className} path="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>;
    const Send        = ({size,className}) => <Icon size={size} className={className} path="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>;

    // ── 主应用 ───────────────────────────────────────────────
    const App = () => {
      const [activeTab, setActiveTab]       = useState('home');
      const [isTraditional, setIsTraditional] = useState(false);
      const [fontSize, setFontSize]         = useState('medium');
      const [audioLang, setAudioLang]       = useState('minnan');
      const [isPlaying, setIsPlaying]       = useState(false);

      const categories = [
        { id: 1, title: '地理卷',       sub: '自然地理、历史地理、区划...' },
        { id: 2, title: '历史卷',       sub: '古代史、近现代史、重要事件...' },
        { id: 3, title: '民族与宗族卷', sub: '姓氏源流、移民迁徙、族谱...' },
        { id: 4, title: '思想与学术卷', sub: '儒学、书院文化、两岸交流...' },
        { id: 5, title: '文学卷',       sub: '古典文学、民间文学、现当代文学...' },
        { id: 6, title: '艺术卷',       sub: '戏曲、音乐、书法、雕塑...' },
        { id: 7, title: '海洋文化卷',   sub: '海上丝绸之路、妈祖信仰、造船...' },
      ];

      const content = {
        title: isTraditional ? '媽祖文化' : '妈祖文化',
        body: isTraditional
          ? '媽祖是流傳於中國沿海地區的民間信仰。媽祖文化作為閩台文化的重要組成部分，深深紮根於兩岸民眾的生活中。據記載，媽祖原名林默，宋代福建莆田湄洲島人。她一生行善積德，救助海難，被尊為「海上女神」。'
          : '妈祖是流传于中国沿海地区的民间信仰。妈祖文化作为闽台文化的重要组成部分，深深扎根于两岸民众的生活中。据记载，妈祖原名林默，宋代福建莆田湄洲岛人。她一生行善积德，救助海难，被尊为"海上女神"。',
        tags: ['民俗', '信仰', '海洋文化']
      };

      const fontSizeClasses = { small: 'text-sm', medium: 'text-base', large: 'text-lg', xlarge: 'text-xl' };

      // ── 首页 ────────────────────────────────────────────
      const renderHome = () => (
        <div className="flex flex-col h-full bg-slate-50">
          <div className="bg-red-700 text-white p-6 pt-12 rounded-b-3xl shadow-lg relative overflow-hidden">
            <div className="absolute top-0 right-0 opacity-10 w-32 h-32 border-[10px] border-white rounded-full"
              style={{marginRight:'-4rem',marginTop:'-4rem'}}></div>
            <h1 className="text-2xl font-bold mb-2">闽台文化大辞典</h1>
            <p className="text-red-100 text-sm opacity-80 italic">系统性地方文化百科 · 数字化平台</p>
            <div className="mt-6 flex items-center rounded-full px-4 py-2"
              style={{background:'rgba(255,255,255,0.2)'}}>
              <Search size={18} className="mr-2" style={{color:'rgba(255,255,255,0.7)'}} />
              <input type="text" placeholder="搜词条、搜历史、搜民俗..."
                className="bg-transparent border-none w-full text-sm"
                style={{color:'white'}}
                onFocus={e => e.target.style.outline='none'}
              />
            </div>
          </div>

          <div className="flex-1 overflow-y-auto scrollbar-hide px-4 py-6">
            <div className="flex justify-between items-center mb-4">
              <h2 className="text-gray-800 font-bold border-l-4 border-red-700 pl-2">卷目导航</h2>
              <span className="text-xs text-gray-500">共 14 卷</span>
            </div>
            <div className="space-y-3">
              {categories.map(item => (
                <div key={item.id}
                  className="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex items-center justify-between"
                  style={{cursor:'pointer'}}
                  onClick={() => setActiveTab('reader')}>
                  <div className="flex items-center space-x-4">
                    <div className="w-10 h-10 bg-blue-50 text-blue-900 rounded-lg flex items-center justify-center font-bold">
                      {item.title[0]}
                    </div>
                    <div>
                      <h3 className="text-gray-800 font-semibold">{item.title}</h3>
                      <p className="text-xs text-gray-500 truncate" style={{maxWidth:'12rem'}}>{item.sub}</p>
                    </div>
                  </div>
                  <ChevronRight size={18} className="text-gray-300" />
                </div>
              ))}
            </div>
          </div>
        </div>
      );

      // ── 阅读详情页 ──────────────────────────────────────
      const renderReader = () => (
        <div className="flex flex-col h-full bg-white">
          <div className="flex items-center justify-between p-4 pt-12 border-b">
            <button onClick={() => setActiveTab('home')} className="p-2 bg-transparent border-none">
              <ArrowLeft size={20} />
            </button>
            <h2 className="font-bold">{content.title}</h2>
            <button
              onClick={() => setIsTraditional(!isTraditional)}
              className="px-2 py-1 text-xs border border-gray-300 rounded text-gray-600 font-medium bg-transparent">
              {isTraditional ? '简体' : '繁体'}
            </button>
          </div>

          <div className="flex-1 overflow-y-auto scrollbar-hide p-6 leading-relaxed">
            <div className="mb-4 rounded-xl flex items-center justify-center overflow-hidden border bg-slate-100"
              style={{aspectRatio:'16/9'}}>
              <div className="text-gray-400 text-sm flex flex-col items-center">
                <span className="mb-2 text-2xl">🖼️</span>
                <span>妈祖祭典图示（辞典插图）</span>
              </div>
            </div>

            <div className={`text-gray-800 space-y-4 ${fontSizeClasses[fontSize]}`}>
              <p>{content.body}</p>
              <p>
                {isTraditional
                  ? '在台灣，媽祖信仰極為普遍，大大小小的媽祖廟遍布各市鎮鄉村。每年的「媽祖繞境」活動更是規模宏大，被譽為全球三大宗教盛事之一。'
                  : '在台湾，妈祖信仰极为普遍，大大小小的妈祖庙遍布各市镇乡村。每年的"妈祖绕境"活动更是规模宏大，被誉为全球三大宗教盛事之一。'}
              </p>
            </div>

            <div className="mt-10 pt-6 border-t flex flex-wrap gap-2">
              {content.tags.map(tag => (
                <span key={tag} className="px-3 py-1 bg-slate-100 text-slate-600 text-xs rounded-full">#{tag}</span>
              ))}
            </div>
          </div>

          {/* 阅读辅助工具栏 */}
          <div className="bg-white border-t p-4 pb-8 space-y-4"
            style={{boxShadow:'0 -4px 10px rgba(0,0,0,0.05)'}}>
            <div className="flex items-center justify-between">
              <div className="flex items-center space-x-4">
                <button
                  onClick={() => setIsPlaying(!isPlaying)}
                  className="w-10 h-10 bg-red-700 text-white rounded-full flex items-center justify-center shadow-md border-none"
                  style={{transition:'transform 0.1s'}}
                  onMouseDown={e => e.currentTarget.style.transform='scale(0.93)'}
                  onMouseUp={e => e.currentTarget.style.transform='scale(1)'}>
                  {isPlaying ? <Pause size={20} /> : <Play size={20} style={{marginLeft:'3px'}} />}
                </button>
                <div>
                  <div className="flex items-center space-x-2">
                    <span className="text-xs font-bold text-gray-700">正在朗读</span>
                    <select
                      className="bg-slate-100 px-1 rounded border-none"
                      style={{fontSize:'10px'}}
                      value={audioLang}
                      onChange={e => setAudioLang(e.target.value)}>
                      <option value="mandarin">普通话</option>
                      <option value="minnan">闽南语 (台语)</option>
                    </select>
                  </div>
                  <p style={{fontSize:'10px'}} className="text-gray-400">语速 1.0x · AI 合成语音</p>
                </div>
              </div>
              <button
                onClick={() => {
                  const sizes = ['small','medium','large','xlarge'];
                  setFontSize(sizes[(sizes.indexOf(fontSize)+1)%sizes.length]);
                }}
                className="p-2 bg-slate-50 rounded-lg border-none">
                <Settings size={20} />
              </button>
            </div>
          </div>
        </div>
      );

      // ── AI 问答页 ───────────────────────────────────────
      const renderAI = () => (
        <div className="flex flex-col h-full" style={{background:'#F8FAFC'}}>
          <div className="bg-white border-b p-4 pt-12 text-center">
            <div className="flex justify-center items-center space-x-2">
              <div className="w-8 h-8 bg-indigo-600 rounded-full flex items-center justify-center text-white">
                <MessageSq size={16} />
              </div>
              <h2 className="font-bold">文化知识助手</h2>
            </div>
            <p style={{fontSize:'10px'}} className="text-gray-400 mt-1">基于《闽台文化大辞典》知识库</p>
          </div>

          <div className="flex-1 overflow-y-auto scrollbar-hide p-4 space-y-4">
            <div className="flex justify-center">
              <span className="bg-slate-200 text-slate-500 px-3 py-1 rounded-full" style={{fontSize:'10px'}}>
                欢迎使用，您可以询问关于闽台文化、历史、民俗的任何问题
              </span>
            </div>

            {/* AI 欢迎 */}
            <div className="flex items-start space-x-3">
              <div className="w-8 h-8 bg-indigo-100 rounded-full flex-shrink-0 flex items-center justify-center text-indigo-600 text-xs font-bold">AI</div>
              <div className="bg-white p-3 rounded-2xl shadow-sm border text-sm text-gray-800" style={{maxWidth:'80%',borderTopLeftRadius:0}}>
                <p>您好！我是您的闽台文化小助手。有什么我可以帮您的吗？您可以问我：</p>
                <div className="mt-3 space-y-2">
                  <button className="block w-full text-left text-xs text-indigo-600 bg-indigo-50 p-2 rounded-lg border border-indigo-100 cursor-pointer">
                    "闽南语和台语有什么区别？"
                  </button>
                  <button className="block w-full text-left text-xs text-indigo-600 bg-indigo-50 p-2 rounded-lg border border-indigo-100 cursor-pointer">
                    "介绍一下两岸共同的元宵习俗"
                  </button>
                </div>
              </div>
            </div>

            {/* 用户提问 */}
            <div className="flex items-start flex-row-reverse" style={{gap:'0.75rem'}}>
              <div className="w-8 h-8 bg-red-700 rounded-full flex-shrink-0 flex items-center justify-center text-white text-xs">我</div>
              <div className="bg-red-700 text-white p-3 rounded-2xl shadow-sm text-sm" style={{maxWidth:'80%',borderTopRightRadius:0}}>
                妈祖文化在闽台两地是如何传承的？
              </div>
            </div>

            {/* AI 深度回答 */}
            <div className="flex items-start space-x-3">
              <div className="w-8 h-8 bg-indigo-100 rounded-full flex-shrink-0 flex items-center justify-center text-indigo-600 text-xs font-bold">AI</div>
              <div className="bg-white p-3 rounded-2xl shadow-sm border" style={{maxWidth:'80%',borderTopLeftRadius:0}}>
                <p className="text-sm text-gray-800 leading-relaxed">
                  根据《闽台文化大辞典》相关记载，妈祖文化在两地的传承主要体现在以下几个方面：
                  <br/><br/>
                  1. <b>祭祀仪典：</b> 湄洲祖庙与台湾各大妈祖庙（如北港朝天宫）保持着密切的"分灵"关系。
                  <br/>
                  2. <b>民俗活动：</b> 包含绕境巡安、烧香祈福等。
                  <br/>
                  3. <b>文化认同：</b> 妈祖作为"海上女神"，是两岸渔民及航海者的共同保护神，成为情感连接的纽带。
                </p>
                <div className="mt-2 flex justify-between items-center border-t pt-2" style={{fontSize:'10px',color:'#9ca3af'}}>
                  <span>来源：辞典《海洋文化卷》- 妈祖词条</span>
                  <button className="text-indigo-600 bg-transparent border-none cursor-pointer" style={{fontSize:'10px'}}>查看原文</button>
                </div>
              </div>
            </div>
          </div>

          <div className="bg-white p-4 border-t flex items-center space-x-2">
            <div className="flex-1 bg-slate-100 rounded-full px-4 py-2 flex items-center">
              <input type="text" placeholder="输入您想了解的问题..."
                className="bg-transparent border-none w-full text-sm" />
            </div>
            <button className="w-10 h-10 bg-indigo-600 text-white rounded-full flex items-center justify-center shadow-md border-none">
              <Send size={18} />
            </button>
          </div>
        </div>
      );

      // ── 主结构 ──────────────────────────────────────────
      return (
        <div className="flex items-center justify-center h-screen bg-slate-200">
          {/* 手机容器 */}
          <div className="bg-white overflow-hidden relative flex flex-col"
            style={{
              width: 375,
              height: 760,
              borderRadius: 40,
              boxShadow: '0 25px 60px rgba(0,0,0,0.35)',
              border: '8px solid #1e293b'
            }}>

            {/* 内容区 */}
            <div style={{flex:1, overflow:'hidden', display:'flex', flexDirection:'column'}}>
              {activeTab === 'home'    && renderHome()}
              {activeTab === 'reader' && renderReader()}
              {activeTab === 'ai'     && renderAI()}
              {activeTab === 'profile' && (
                <div className="flex flex-col items-center justify-center h-full text-gray-500">
                  <UserIcon size={64} className="mb-4 text-gray-300" />
                  <p>个人中心页面开发中</p>
                  <button onClick={() => setActiveTab('home')}
                    className="mt-4 text-red-700 text-sm font-bold bg-transparent border-none cursor-pointer">
                    返回首页
                  </button>
                </div>
              )}
            </div>

            {/* 底部导航栏 */}
            <div className="h-16 bg-white border-t flex items-center justify-around pb-2">
              {[
                { key: 'home',    Icon: BookOpen,  label: '辞典目录' },
                { key: 'reader',  Icon: Search,    label: '全文搜索' },
                { key: 'ai',      Icon: MessageSq, label: 'AI 问答' },
                { key: 'profile', Icon: UserIcon,  label: '我的权益' },
              ].map(({ key, Icon: I, label }) => (
                <button key={key} onClick={() => setActiveTab(key)}
                  className="flex flex-col items-center bg-transparent border-none"
                  style={{gap:4, color: activeTab === key ? '#B91C1C' : '#9ca3af', transition:'color 0.2s', cursor:'pointer'}}>
                  <I size={20} />
                  <span style={{fontSize:'10px', fontWeight:'bold'}}>{label}</span>
                </button>
              ))}
            </div>

            {/* 手机底部指示条 */}
            <div className="absolute bg-slate-200 rounded-full"
              style={{bottom:4, left:'50%', transform:'translateX(-50%)', width:128, height:6}}></div>
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
